services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: retail_banking
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: banking
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking -d retail_banking"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/retail_banking
      SPRING_DATASOURCE_USERNAME: banking
      SPRING_DATASOURCE_PASSWORD: banking
      BANKING_JWT_SECRET: docker-compose-local-secret-change-me-32-bytes-minimum
    ports:
      - "8080:8080"

volumes:
  postgres-data:
