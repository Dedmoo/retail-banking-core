spring:
  application:
    name: retail-banking-core
  datasource:
    url: jdbc:postgresql://localhost:5432/retail_banking
    username: banking
    password: banking
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

banking:
  jwt:
    secret: ${BANKING_JWT_SECRET:local-dev-secret-key-change-me-please-32-bytes-minimum}
    expiration-minutes: 60
  ratelimit:
    transfer:
      capacity: 10
      refill-minutes: 1

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
  health:
    db:
      enabled: true
